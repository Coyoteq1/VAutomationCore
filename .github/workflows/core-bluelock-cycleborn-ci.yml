name: core-bluelock-cycleborn-ci

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  build-and-guard:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Restore root project
        run: dotnet restore VAutomationCore.csproj

      - name: Build VAutomationCore
        run: dotnet build VAutomationCore.csproj -c Debug --nologo --no-restore

      - name: Build CycleBorn
        run: dotnet build CycleBorn/Vlifecycle.csproj -c Debug --nologo --no-restore

      - name: Build Bluelock
        run: dotnet build Bluelock/VAutoZone.csproj -c Debug --nologo --no-restore

      - name: Build Bluelock tests
        run: dotnet build tests/Bluelock.Tests/Bluelock.Tests.csproj -c Debug --nologo --no-restore

      - name: Guard - csproj compile include/exclude mismatch
        shell: pwsh
        run: |
          $pluginPath = 'Bluelock/Plugin.cs'
          $csprojPath = 'Bluelock/VAutoZone.csproj'
          $plugin = Get-Content $pluginPath -Raw
          $csproj = Get-Content $csprojPath -Raw
          $referencesSystems = $plugin.Contains('VAuto.Zone.Systems')
          $excludesSystems = $csproj -match '<Compile Remove="Systems\\\*\*\\\*\.cs"'
          if ($referencesSystems -and $excludesSystems) {
            throw 'Contract mismatch: Plugin references VAuto.Zone.Systems while csproj excludes Systems/**.'
          }

      - name: Guard - command surface aligns with csproj exclusions
        shell: pwsh
        run: |
          $csprojPath = 'Bluelock/VAutoZone.csproj'
          $readmePath = 'README.md'
          $docsReadmePath = 'docs/README.md'
          $pluginPath = 'Bluelock/Plugin.cs'
          $csproj = Get-Content $csprojPath -Raw
          $readme = Get-Content $readmePath -Raw
          $docsReadme = Get-Content $docsReadmePath -Raw
          $plugin = Get-Content $pluginPath -Raw
          $arenaExcluded = $csproj -match '<Compile Remove="Commands\\Core\\ArenaEcsCommands.cs"'
          if (-not $arenaExcluded) {
            throw 'Expected ArenaEcsCommands.cs to be excluded by csproj.'
          }
          if ($plugin -match 'Command Roots:\s*zone,\s*arena') {
            throw 'Startup summary still reports .arena as active command root.'
          }
          if (($readme -match '\.arena\b') -and ($readme -notmatch 'excluded by build')) {
            throw 'README mentions .arena without marking it excluded by build.'
          }
          if (($docsReadme -match '\.arena\b') -and ($docsReadme -notmatch 'excluded by build')) {
            throw 'docs/README mentions .arena without marking it excluded by build.'
          }

      - name: Test (best effort)
        continue-on-error: true
        run: dotnet test tests/Bluelock.Tests/Bluelock.Tests.csproj -c Debug --nologo --no-build
